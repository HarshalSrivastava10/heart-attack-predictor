<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="13">
  <defs>
    <marker id="seq-arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#333"/>
    </marker>
  </defs>
  <text x="360" y="22" text-anchor="middle" font-size="15" font-weight="600" fill="#111">Inference request path</text>

  <!-- Lifelines -->
  <line x1="120" y1="45" x2="120" y2="260" stroke="#bbb" stroke-dasharray="6 4"/>
  <line x1="360" y1="45" x2="360" y2="260" stroke="#bbb" stroke-dasharray="6 4"/>
  <line x1="600" y1="45" x2="600" y2="260" stroke="#bbb" stroke-dasharray="6 4"/>

  <rect x="60" y="35" width="120" height="32" fill="#e3f2fd" stroke="#1565c0" rx="4"/>
  <text x="120" y="55" text-anchor="middle" font-weight="600" font-size="12">Client</text>
  <rect x="300" y="35" width="120" height="32" fill="#e8f5e9" stroke="#2e7d32" rx="4"/>
  <text x="360" y="55" text-anchor="middle" font-weight="600" font-size="12">FastAPI</text>
  <rect x="540" y="35" width="120" height="32" fill="#fce4ec" stroke="#c2185b" rx="4"/>
  <text x="600" y="55" text-anchor="middle" font-weight="600" font-size="12">Sklearn Pipeline</text>

  <!-- Messages -->
  <line x1="120" y1="95" x2="355" y2="95" stroke="#333" marker-end="url(#seq-arrow)"/>
  <text x="235" y="90" text-anchor="middle" font-size="11" fill="#333">POST /predict (JSON)</text>

  <line x1="360" y1="125" x2="595" y2="125" stroke="#333" marker-end="url(#seq-arrow)"/>
  <text x="475" y="120" text-anchor="middle" font-size="11" fill="#333">feature vector</text>

  <line x1="600" y1="155" x2="365" y2="155" stroke="#333" marker-end="url(#seq-arrow)" stroke-dasharray="5"/>
  <text x="480" y="150" text-anchor="middle" font-size="11" fill="#333">probabilities</text>

  <line x1="360" y1="185" x2="125" y2="185" stroke="#333" marker-end="url(#seq-arrow)"/>
  <text x="240" y="180" text-anchor="middle" font-size="11" fill="#333">prediction + p + confidence</text>

  <rect x="95" y="205" width="530" height="48" fill="#fafafa" stroke="#ccc" rx="4"/>
  <text x="360" y="225" text-anchor="middle" font-size="11" fill="#555">Response JSON: prediction (0/1), probability_positive, confidence</text>
  <text x="360" y="242" text-anchor="middle" font-size="10" fill="#777">confidence = max(p, 1 - p)</text>
</svg>
