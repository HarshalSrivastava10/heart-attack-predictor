<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 380" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#333"/>
    </marker>
  </defs>
  <text x="460" y="22" text-anchor="middle" font-size="15" font-weight="600" fill="#111">High-level system architecture</text>

  <!-- Development -->
  <rect x="20" y="40" width="880" height="120" fill="#e8f4fc" stroke="#2196f3" stroke-width="1.5" rx="6"/>
  <text x="36" y="58" font-weight="600" fill="#1565c0">Development</text>
  <rect x="40" y="70" width="90" height="36" fill="#fff" stroke="#1976d2" rx="4"/>
  <text x="85" y="92" text-anchor="middle" font-size="11">data/raw CSV</text>
  <rect x="150" y="70" width="100" height="36" fill="#fff" stroke="#1976d2" rx="4"/>
  <text x="200" y="92" text-anchor="middle" font-size="11">EDA scripts</text>
  <rect x="270" y="70" width="90" height="36" fill="#fff" stroke="#1976d2" rx="4"/>
  <text x="315" y="92" text-anchor="middle" font-size="11">train.py</text>
  <rect x="390" y="70" width="110" height="36" fill="#fff" stroke="#1976d2" rx="4"/>
  <text x="445" y="92" text-anchor="middle" font-size="11">MLflow (mlruns)</text>
  <rect x="520" y="70" width="130" height="36" fill="#fff" stroke="#1976d2" rx="4"/>
  <text x="585" y="92" text-anchor="middle" font-size="11">models/*.joblib</text>
  <line x1="130" y1="88" x2="148" y2="88" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="250" y1="88" x2="268" y2="88" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="360" y1="88" x2="388" y2="88" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="500" y1="88" x2="518" y2="88" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="130" y1="88" x2="145" y2="88" stroke="#333"/>
  <path d="M 85 106 L 85 115 L 315 115 L 315 106" fill="none" stroke="#333" marker-end="url(#arrow)"/>
  <text x="195" y="110" text-anchor="middle" font-size="10" fill="#555">from CSV</text>

  <!-- Serving -->
  <rect x="20" y="175" width="880" height="85" fill="#e8f8ef" stroke="#4caf50" stroke-width="1.5" rx="6"/>
  <text x="36" y="193" font-weight="600" fill="#2e7d32">Serving</text>
  <rect x="40" y="205" width="130" height="40" fill="#fff" stroke="#388e3c" rx="4"/>
  <text x="105" y="228" text-anchor="middle" font-size="11">models/*.joblib</text>
  <rect x="200" y="205" width="140" height="40" fill="#fff" stroke="#388e3c" rx="4"/>
  <text x="270" y="228" text-anchor="middle" font-size="11">FastAPI /predict</text>
  <rect x="370" y="205" width="160" height="40" fill="#fff" stroke="#388e3c" rx="4"/>
  <text x="450" y="228" text-anchor="middle" font-size="11">/metrics (Prometheus)</text>
  <line x1="170" y1="225" x2="198" y2="225" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="340" y1="225" x2="368" y2="225" stroke="#333" marker-end="url(#arrow)"/>

  <!-- Connector dev joblib to serving -->
  <line x1="585" y1="106" x2="585" y2="140" stroke="#666" stroke-dasharray="4"/>
  <line x1="585" y1="140" x2="105" y2="140" stroke="#666" stroke-dasharray="4"/>
  <line x1="105" y1="140" x2="105" y2="203" stroke="#666" stroke-dasharray="4"/>
  <text x="340" y="135" text-anchor="middle" font-size="10" fill="#555">bundle loads into API</text>

  <!-- CI -->
  <rect x="20" y="275" width="880" height="90" fill="#fff8e6" stroke="#ff9800" stroke-width="1.5" rx="6"/>
  <text x="36" y="293" font-weight="600" fill="#e65100">GitHub Actions (CI)</text>
  <rect x="40" y="305" width="70" height="36" fill="#fff" stroke="#ef6c00" rx="4"/>
  <text x="75" y="327" text-anchor="middle" font-size="11">Ruff</text>
  <rect x="130" y="305" width="80" height="36" fill="#fff" stroke="#ef6c00" rx="4"/>
  <text x="170" y="327" text-anchor="middle" font-size="11">Pytest</text>
  <rect x="230" y="305" width="110" height="36" fill="#fff" stroke="#ef6c00" rx="4"/>
  <text x="285" y="327" text-anchor="middle" font-size="11">train --fast</text>
  <rect x="360" y="305" width="130" height="36" fill="#fff" stroke="#ef6c00" rx="4"/>
  <text x="425" y="327" text-anchor="middle" font-size="11">Artifact upload</text>
  <line x1="110" y1="323" x2="128" y2="323" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="210" y1="323" x2="228" y2="323" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="340" y1="323" x2="358" y2="323" stroke="#333" marker-end="url(#arrow)"/>
</svg>
